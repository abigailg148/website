<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-top: #1B2149;
    --bg-bottom: #2E1F52;
    --board-bg: #262C52;
    --cell-bg: rgba(255,255,255,0.05);
    --cell-border: rgba(255,255,255,0.06);
    --text-light: #EAEBFF;
    --text-soft: #9FA3D1;
    --text-dark: #1B2149;
    --glow: #C266FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
    color: var(--text-light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    -webkit-tap-highlight-color: transparent;
  }

  .wrap { width: 100%; max-width: 460px; }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 18px;
    gap: 12px;
  }

  h1 {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: clamp(2.4rem, 10vw, 3.2rem);
    background: linear-gradient(135deg, #8FB8FF 0%, #C266FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline { color: var(--text-soft); font-size: 0.9rem; margin-top: 4px; }

  .scores { display: flex; gap: 10px; }
  .score-box {
    background: var(--board-bg);
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    min-width: 70px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
  }
  .score-box .label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-soft);
    font-weight: 700;
  }
  .score-box .value {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 1.3rem;
    color: var(--text-light);
  }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .hint { color: var(--text-soft); font-size: 0.85rem; }

  #new-game-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    background: linear-gradient(135deg, #6D97FA 0%, #C266FF 100%);
    color: white;
    border: none;
    padding: 9px 18px;
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 14px rgba(194, 102, 255, 0.35);
  }
  #new-game-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(194, 102, 255, 0.5); }
  #new-game-btn:active { transform: translateY(0); }

  .board-wrap {
    position: relative;
    background: var(--board-bg);
    border-radius: 18px;
    padding: 10px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.35);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    aspect-ratio: 1 / 1;
    touch-action: none;
  }

  .cell {
    background: var(--cell-bg);
    border-radius: 10px;
    box-shadow: inset 0 0 0 1px var(--cell-border);
  }

  .tile {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    transition: left 0.12s ease, top 0.12s ease;
    user-select: none;
  }

  .tile.spawn { animation: spawnPop 0.18s ease-out; }
  .tile.merged { animation: mergePop 0.16s ease-out; }

  @keyframes spawnPop {
    from { transform: scale(0.3); opacity: 0.4; }
    to { transform: scale(1); opacity: 1; }
  }
  @keyframes mergePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.14); }
    100% { transform: scale(1); }
  }

  /* Tile value -> blue-to-purple progression */
  .v2    { background: #B9D4FF; color: var(--text-dark); }
  .v4    { background: #9EC2FF; color: var(--text-dark); }
  .v8    { background: #82AEFF; color: var(--text-dark); }
  .v16   { background: #6D97FA; color: white; }
  .v32   { background: #7D8AFB; color: white; }
  .v64   { background: #8F7DFC; color: white; }
  .v128  { background: #A06FFB; color: white; box-shadow: 0 0 12px rgba(160,111,251,0.5); }
  .v256  { background: #B160F5; color: white; box-shadow: 0 0 14px rgba(177,96,245,0.55); }
  .v512  { background: #C351EE; color: white; box-shadow: 0 0 16px rgba(195,81,238,0.6); }
  .v1024 { background: #D442E4; color: white; box-shadow: 0 0 20px rgba(212,66,228,0.65); }
  .v2048 { background: linear-gradient(135deg, #E838D6, #FF6EF0); color: white; box-shadow: 0 0 26px rgba(255,110,240,0.8); animation: glow2048 1.4s ease-in-out infinite; }
  .vhigh { background: linear-gradient(135deg, #FF3DC0, #FF77E0); color: white; box-shadow: 0 0 26px rgba(255,61,192,0.8); }

  .tile[data-len="1"], .tile[data-len="2"], .tile[data-len="3"] { font-size: 1.9rem; }
  .tile[data-len="4"] { font-size: 1.5rem; }
  .tile[data-len="5"] { font-size: 1.15rem; }
  .tile[data-len="6"] { font-size: 0.95rem; }

  @keyframes glow2048 {
    0%, 100% { box-shadow: 0 0 18px rgba(255,110,240,0.7); }
    50% { box-shadow: 0 0 32px rgba(255,110,240,1); }
  }

  .overlay {
    position: absolute;
    inset: 10px;
    border-radius: 14px;
    background: rgba(27, 33, 73, 0.88);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    text-align: center;
    padding: 20px;
    z-index: 10;
  }
  .overlay.show { display: flex; }

  .overlay h2 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
  }
  .overlay p { color: var(--text-soft); }

  .overlay-buttons { display: flex; gap: 10px; }
  .overlay-buttons button {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    border: none;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    color: white;
    transition: transform 0.15s ease;
  }
  .overlay-buttons button:hover { transform: translateY(-2px); }
  .btn-primary { background: linear-gradient(135deg, #6D97FA 0%, #C266FF 100%); }
  .btn-secondary { background: rgba(255,255,255,0.12); }

  .footer-links {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
  }
  .footer-links a {
    color: var(--text-soft);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: var(--text-light); }

  #score-entry {
    display: none;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 240px;
  }
  #player-name-input {
    padding: 9px 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text-light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    text-align: center;
    transition: border-color 0.2s;
  }
  #player-name-input::placeholder { color: var(--text-soft); }
  #player-name-input:focus { border-color: var(--glow); }

  #submit-score-btn {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 14px;
    background: linear-gradient(135deg, #6D97FA 0%, #C266FF 100%);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  #submit-score-btn:hover:not(:disabled) { transform: translateY(-2px); }
  #submit-score-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  #save-confirm {
    font-size: 12px;
    color: #7CE7B8;
    font-weight: 600;
    min-height: 16px;
  }

  .leaderboard-section {
    background: var(--board-bg);
    border-radius: 16px;
    padding: 18px 22px;
    margin-top: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .leaderboard-section h3 {
    font-family: 'Fredoka', sans-serif;
    font-size: 1.15rem;
    text-align: center;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #8FB8FF 0%, #C266FF 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #leaderboard-list {
    list-style: none;
    counter-reset: rank;
  }
  #leaderboard-list li {
    counter-increment: rank;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 7px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  #leaderboard-list li:last-child { border-bottom: none; }
  #leaderboard-list li::before {
    content: counter(rank);
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #6D97FA;
    color: white;
    font-weight: 700;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #leaderboard-list li:nth-child(1)::before { background: linear-gradient(135deg, #FFD700, #FFA500); }
  #leaderboard-list li:nth-child(2)::before { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); }
  #leaderboard-list li:nth-child(3)::before { background: linear-gradient(135deg, #CD7F32, #B8732C); }
  .lb-name {
    flex: 1;
    font-weight: 600;
    color: var(--text-light);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lb-score {
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    color: #D89DFF;
  }
  .lb-empty {
    color: var(--text-soft);
    font-style: italic;
    justify-content: center;
    text-align: center;
  }
  .lb-empty::before { display: none; }

  @media (max-width: 400px) {
    .score-box { min-width: 58px; padding: 7px 10px; }
    .hint { font-size: 0.78rem; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-row">
    <div>
      <h1>2048</h1>
      <div class="tagline">Slide the tiles. Chase the glow.</div>
    </div>
    <div class="scores">
      <div class="score-box">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">Best</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="hint">Arrows, WASD, or swipe</div>
    <button id="new-game-btn">🔄 New Game</button>
  </div>

  <div class="board-wrap">
    <div id="board"></div>
    <div class="overlay" id="win-overlay">
      <h2>🎉 You hit 2048!</h2>
      <p>Keep going for a higher score, or start fresh.</p>
      <div class="overlay-buttons">
        <button class="btn-secondary" id="keep-going-btn">Keep Going</button>
        <button class="btn-primary" id="win-new-game-btn">New Game</button>
      </div>
    </div>
    <div class="overlay" id="lose-overlay">
      <h2>No more moves</h2>
      <p id="final-score-text">Final score: 0</p>
      <div id="score-entry">
        <input type="text" id="player-name-input" placeholder="Enter your name" maxlength="20">
        <button id="submit-score-btn">🏆 Save Score</button>
        <div id="save-confirm"></div>
      </div>
      <div class="overlay-buttons">
        <button class="btn-primary" id="lose-new-game-btn">Try Again</button>
      </div>
    </div>
  </div>

  <div class="leaderboard-section">
    <h3>🏆 Top 10 Scores</h3>
    <ol id="leaderboard-list">
      <li class="lb-empty">Loading scores…</li>
    </ol>
  </div>

  <div class="footer-links">
    <a href="games.html">← All Games</a>
    <a href="index.html">🏠 Home</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot,
    query, orderBy, limit, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDVXiEKtcjyThNyqFb-pRMttBydyq7KeGg",
    authDomain: "abigailg1048.firebaseapp.com",
    projectId: "abigailg1048",
    storageBucket: "abigailg1048.firebasestorage.app",
    messagingSenderId: "269572512400",
    appId: "1:269572512400:web:05cb0eb6dbc5c6421c1615",
    measurementId: "G-7E05F32959"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const scoreEntry = document.getElementById('score-entry');
  const nameInput = document.getElementById('player-name-input');
  const submitScoreBtn = document.getElementById('submit-score-btn');
  const saveConfirm = document.getElementById('save-confirm');
  const leaderboardList = document.getElementById('leaderboard-list');

  const savedName = localStorage.getItem('2048Name');
  if (savedName) nameInput.value = savedName;

  function escapeHTML(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderLeaderboard(scores) {
    if (scores.length === 0) {
      leaderboardList.innerHTML = '<li class="lb-empty">No scores yet — be the first!</li>';
      return;
    }
    leaderboardList.innerHTML = scores.map(s => `
      <li>
        <span class="lb-name">${escapeHTML(s.name)}</span>
        <span class="lb-score">${s.score}</span>
      </li>
    `).join('');
  }

  function watchLeaderboard() {
    const q = query(collection(db, '2048Leaderboard'), orderBy('score', 'desc'), limit(10));
    onSnapshot(q, (snap) => {
      renderLeaderboard(snap.docs.map(d => d.data()));
    }, (err) => {
      console.error('Leaderboard listener failed:', err);
      leaderboardList.innerHTML = '<li class="lb-empty">Could not load scores.</li>';
    });
  }

  submitScoreBtn.addEventListener('click', () => {
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    localStorage.setItem('2048Name', name);
    submitScoreBtn.disabled = true;
    submitScoreBtn.textContent = 'Saving…';
    addDoc(collection(db, '2048Leaderboard'), {
      name,
      score: window.__current2048Score,
      createdAt: serverTimestamp()
    }).then(() => {
      saveConfirm.textContent = '✓ Score saved!';
      submitScoreBtn.textContent = '🏆 Save Score';
    }).catch(err => {
      console.error('Score save failed:', err);
      saveConfirm.textContent = 'Could not save — try again.';
      submitScoreBtn.disabled = false;
      submitScoreBtn.textContent = '🏆 Save Score';
    });
  });

  watchLeaderboard();

  window.__resetScoreEntry = function() {
    scoreEntry.style.display = 'none';
    saveConfirm.textContent = '';
    submitScoreBtn.disabled = false;
    submitScoreBtn.textContent = '🏆 Save Score';
  };

  window.__showScoreEntry = function(score) {
    window.__current2048Score = score;
    scoreEntry.style.display = 'flex';
  };
</script>

<script>
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const winOverlay = document.getElementById('win-overlay');
  const loseOverlay = document.getElementById('lose-overlay');
  const finalScoreText = document.getElementById('final-score-text');

  let grid = [];
  let score = 0;
  let best = parseInt(localStorage.getItem('2048_best') || '0', 10);
  let hasWon = false;
  let wonBannerShown = false;

  bestEl.textContent = best;

  // ---------- cells (static background) ----------
  function buildCells() {
    boardEl.innerHTML = '';
    for (let i = 0; i < SIZE * SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      boardEl.appendChild(cell);
    }
  }

  // ---------- board init ----------
  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
  }

  function getEmptyCells() {
    const cells = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) cells.push([r, c]);
    return cells;
  }

  function addRandomTile() {
    const empties = getEmptyCells();
    if (empties.length === 0) return null;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  function startGame() {
    grid = emptyGrid();
    score = 0;
    hasWon = false;
    wonBannerShown = false;
    winOverlay.classList.remove('show');
    loseOverlay.classList.remove('show');
    scoreEl.textContent = '0';
    addRandomTile();
    addRandomTile();
    render({ spawned: [], merged: [] });
  }

  // ---------- rendering ----------
  function tileClassFor(value) {
    if (value <= 1024) return 'v' + value;
    if (value === 2048) return 'v2048';
    return 'vhigh';
  }

  function render(anim) {
    const cellSize = boardEl.clientWidth / SIZE;
    const gap = 10;
    const step = (boardEl.clientWidth + gap) / SIZE;

    boardEl.querySelectorAll('.tile').forEach(t => t.remove());

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const value = grid[r][c];
        if (value === 0) continue;
        const tile = document.createElement('div');
        tile.className = `tile ${tileClassFor(value)}`;
        tile.dataset.len = String(value).length;
        tile.style.width = cellSize + 'px';
        tile.style.height = cellSize + 'px';
        tile.style.left = (c * step) + 'px';
        tile.style.top = (r * step) + 'px';
        tile.textContent = value;

        const isSpawn = anim.spawned.some(([sr, sc]) => sr === r && sc === c);
        const isMerged = anim.merged.some(([mr, mc]) => mr === r && mc === c);
        if (isSpawn) tile.classList.add('spawn');
        if (isMerged) tile.classList.add('merged');

        boardEl.appendChild(tile);
      }
    }

    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('2048_best', best);
    }
  }

  // ---------- move logic ----------
  function slideLine(line) {
    const merged = [];
    let arr = line.filter(v => v !== 0);
    let gained = 0;
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i + 1]) {
        arr[i] *= 2;
        gained += arr[i];
        merged.push(i);
        arr.splice(i + 1, 1);
      }
    }
    while (arr.length < SIZE) arr.push(0);
    return { line: arr, gained, mergedIndices: merged };
  }

  function move(direction) {
    const before = JSON.stringify(grid);
    let gained = 0;
    const mergedCells = [];

    if (direction === 'left' || direction === 'right') {
      for (let r = 0; r < SIZE; r++) {
        let line = grid[r].slice();
        if (direction === 'right') line.reverse();
        const result = slideLine(line);
        gained += result.gained;
        let finalLine = result.line;
        if (direction === 'right') finalLine = finalLine.slice().reverse();
        grid[r] = finalLine;
        result.mergedIndices.forEach(i => {
          const c = direction === 'right' ? (SIZE - 1 - i) : i;
          mergedCells.push([r, c]);
        });
      }
    } else {
      for (let c = 0; c < SIZE; c++) {
        let col = [];
        for (let r = 0; r < SIZE; r++) col.push(grid[r][c]);
        if (direction === 'down') col.reverse();
        const result = slideLine(col);
        gained += result.gained;
        let finalCol = result.line;
        if (direction === 'down') finalCol = finalCol.slice().reverse();
        for (let r = 0; r < SIZE; r++) grid[r][c] = finalCol[r];
        result.mergedIndices.forEach(i => {
          const r = direction === 'down' ? (SIZE - 1 - i) : i;
          mergedCells.push([r, c]);
        });
      }
    }

    const moved = JSON.stringify(grid) !== before;
    if (!moved) return;

    score += gained;
    const spawned = addRandomTile();
    render({ spawned: spawned ? [spawned] : [], merged: mergedCells });

    if (!hasWon && grid.some(row => row.includes(2048))) {
      hasWon = true;
      if (!wonBannerShown) {
        wonBannerShown = true;
        winOverlay.classList.add('show');
      }
    }

    if (isGameOver()) {
      finalScoreText.textContent = `Final score: ${score}`;
      loseOverlay.classList.add('show');
    }
  }

  function isGameOver() {
    if (getEmptyCells().length > 0) return false;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        if (c < SIZE - 1 && grid[r][c + 1] === v) return false;
        if (r < SIZE - 1 && grid[r + 1][c] === v) return false;
      }
    }
    return true;
  }

  // ---------- input ----------
  const KEY_MAP = {
    ArrowLeft: 'left', a: 'left', A: 'left',
    ArrowRight: 'right', d: 'right', D: 'right',
    ArrowUp: 'up', w: 'up', W: 'up',
    ArrowDown: 'down', s: 'down', S: 'down'
  };

  document.addEventListener('keydown', (e) => {
    const dir = KEY_MAP[e.key];
    if (!dir) return;
    e.preventDefault();
    if (winOverlay.classList.contains('show') || loseOverlay.classList.contains('show')) return;
    move(dir);
  });

  let touchStartX = 0, touchStartY = 0;
  boardEl.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  boardEl.addEventListener('touchend', (e) => {
    if (winOverlay.classList.contains('show') || loseOverlay.classList.contains('show')) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) {
      move(dx > 0 ? 'right' : 'left');
    } else {
      move(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  document.getElementById('new-game-btn').addEventListener('click', startGame);
  document.getElementById('win-new-game-btn').addEventListener('click', startGame);
  document.getElementById('lose-new-game-btn').addEventListener('click', startGame);
  document.getElementById('keep-going-btn').addEventListener('click', () => {
    winOverlay.classList.remove('show');
  });

  window.addEventListener('resize', () => render({ spawned: [], merged: [] }));

  buildCells();
  startGame();
</script>
</body>
</html>
